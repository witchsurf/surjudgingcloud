# ============================================================================
#  NGINX REVERSE PROXY CONFIGURATION FOR ESP32 SSE PRIORITY STREAM
#  Location: infra/nginx_sse_proxy.conf
# ============================================================================
#
#  This file provides a highly optimized reverse proxy configuration for Nginx
#  to stream real-time events from the resident sync daemon to beach displays.
#
#  CRITICAL SSE OPTIMIZATIONS INCLUDED:
#    - proxy_buffering off: Prevents Nginx from accumulating packets and delays.
#    - Keep-Alive Connection: Reuses TCP channels to prevent connection handshakes.
#    - chunked_transfer_encoding off: Forces immediate raw stream flushes.
#    - Unlimited timeouts: Prevents the gateway from closing inactive connections.
#

location /priority/sse {
    # Points to the resident hp-sync-daemon Node process on port 4001.
    # If running Nginx inside Docker, use http://host.docker.internal:4001
    # or the specific host IP (e.g. 192.168.1.2 or 10.0.0.14).
    proxy_pass http://host.docker.internal:4001/priority/sse;

    # Core HTTP standard upgrades
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Disable proxy response buffering
    # (Without this, Nginx buffers the SSE stream, leading to multiple seconds of lag!)
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;
    
    # SSE Stream options
    chunked_transfer_encoding off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;

    # CORS Headers for display accessibility
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, apikey, Authorization" always;
}

# Optional alias endpoint for standard HTTP clients
location /events {
    proxy_pass http://host.docker.internal:4001/priority/sse;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;
    chunked_transfer_encoding off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
}
