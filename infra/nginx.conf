server {
  listen 80;
  server_name surfjudging.cloud www.surfjudging.cloud _;

  root /usr/share/nginx/html;
  index index.html;

  # Route SPA (toutes les URLs front renvoient index.html si le fichier n'existe pas)
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Favicon (optionnel) – ne doit jamais casser le site
  location = /favicon.ico {
    try_files $uri =204;
  }
}
